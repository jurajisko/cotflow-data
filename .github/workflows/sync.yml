name: sync-data

on:
  schedule:
    - cron: "15 13 * * 1-5"
    - cron: "45 15 * * 1-5"
    - cron: "15 18 * * 1-5"
    - cron: "0 21 * * 5"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run sync
        run: |
          python scripts/sync_stub.py
